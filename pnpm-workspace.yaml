packages:
  # Core OpenClawOS packages
  - packages/protocol
  - packages/kernel
  - packages/sdk
  # Root package
  - .
  # UI
  - ui
  # Other packages
  - packages/*
  # Extensions (legacy, being migrated to apps)
  - extensions/*
  # Apps (process-isolated applications)
  - apps/*

onlyBuiltDependencies:
  - "@lydell/node-pty"
  - "@matrix-org/matrix-sdk-crypto-nodejs"
  - "@napi-rs/canvas"
  - "@whiskeysockets/baileys"
  - authenticate-pam
  - esbuild
  - node-llama-cpp
  - protobufjs
  - sharp
